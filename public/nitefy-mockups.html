<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NITEFY Mockups</title>
    <style>
      body { margin: 0; background: #090a12; color: white; font-family: Inter, Arial, sans-serif; }
      main { max-width: 1180px; margin: 0 auto; padding: 40px 20px; }
      h1 { font-size: clamp(32px, 7vw, 72px); line-height: .95; margin: 0 0 12px; }
      p { color: rgba(255,255,255,.68); font-size: 18px; margin: 0 0 28px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
      a { color: inherit; text-decoration: none; }
      figure { margin: 0; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); border-radius: 12px; overflow: hidden; }
      img { display: block; width: 100%; height: auto; }
      figcaption { padding: 14px 16px; font-weight: 900; }
    </style>
  </head>
  <body>
    <main>
      <h1>NITEFY mockup versions</h1>
      <p>Open any mockup directly, then export or screenshot for social testing.</p>
      <div class="grid">
        <a href="/nitefy-phone-preview.svg"><figure><img src="/nitefy-phone-preview.svg" alt="nitefy-phone-preview.svg"><figcaption>nitefy-phone-preview.svg</figcaption></figure></a><a href="/nitefy-mockup-clean.svg"><figure><img src="/nitefy-mockup-clean.svg" alt="nitefy-mockup-clean.svg"><figcaption>nitefy-mockup-clean.svg</figcaption></figure></a><a href="/nitefy-mockup-story.svg"><figure><img src="/nitefy-mockup-story.svg" alt="nitefy-mockup-story.svg"><figcaption>nitefy-mockup-story.svg</figcaption></figure></a><a href="/nitefy-mockup-carousel.svg"><figure><img src="/nitefy-mockup-carousel.svg" alt="nitefy-mockup-carousel.svg"><figcaption>nitefy-mockup-carousel.svg</figcaption></figure></a><a href="/nitefy-mobile-screen.svg"><figure><img src="/nitefy-mobile-screen.svg" alt="nitefy-mobile-screen.svg"><figcaption>nitefy-mobile-screen.svg</figcaption></figure></a>
      </div>
    </main>
  </body>
</html>
